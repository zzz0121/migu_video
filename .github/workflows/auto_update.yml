name: Scheduled Docker Data Update

on:
  schedule:
    # 定时任务：每天凌晨 0 点运行（UTC 时间）
    # 分 时 日 月 周
    - cron: '0 0 * * *'
  workflow_dispatch: # 允许你手动在 Actions 页面点击运行

jobs:
  build-and-save:
    runs-on: ubuntu-latest
    
    # 授予写入仓库的权限
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Run Docker Container
        run: |
          # 1. 启动容器（后台运行）
          docker run -d -p 1234:1234 --name migu_video develop767/migu_video:latest
          
          # 2. 等待容器完全启动（根据程序启动速度，可以调整等待秒数）
          echo "等待容器启动..."
          sleep 30
          
          # 3. 访问容器接口并将结果保存到文件
          # 注意：在 GitHub Actions 内部，直接访问 localhost 即可
          # 假设你要抓取的数据在 /interface.txt，根据实际项目修改路径
          curl -s http://localhost:1234/interface.txt > outputlist
          
          # 4. 停止并删除容器
          docker stop migu_video && docker rm migu_video

      - name: Commit and Push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add outputlist
          # 只有当文件有变动时才提交，防止报错
          git diff --quiet && git diff --staged --quiet || (git commit -m "自动更新直播源列表 $(date)" && git push origin master)
